databases:
  - name: hr-agent-db
    databaseName: hr_agent_db
    user: hr_user
    plan: free
    region: oregon

services:
  - type: web
    name: hr-ai-agent
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hr-agent-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CHROMA_DB_PATH
        value: ./chroma_db
      - key: PYTHON_VERSION
        value: "3.10.14"
